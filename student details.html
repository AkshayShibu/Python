<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
</head>
<body>

<h2>Student Information</h2>
<div id="output"></div>

<script>

let student = {
    "name": "Akshay",
    "age": 21,
    "grade": "A"
};

let result = "Name: " + student.name + "<br>" +
             "Age: " + student.age + "<br>" +
             "Grade: " + student.grade;

document.getElementById("output").innerHTML = result;
</script>

</body>
</html>
