<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flexbox Playground • Simple</title>
  <style>
    :root {
      --primary: #6366f1;
      --light:  #f8fafc;
      --dark:   #0f172a;
      --gray:   #64748b;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--light);
      color: var(--dark);
      margin: 0;
      padding: 1.5rem;
      line-height: 1.5;
    }

    h1, h2 {
      text-align: center;
      color: var(--primary);
      margin: 1rem 0;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 1.2rem 0;
    }

    .control {
      min-width: 180px;
    }

    label {
      display: block;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 0.3rem;
    }

    select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    .demo {
      background: white;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 1.5rem;
      min-height: 160px;
      margin: 1rem 0;
      display: flex;
      gap: 0.8rem;
    }

    .item {
      background: var(--primary);
      color: white;
      font-weight: bold;
      padding: 1rem 1.4rem;
      border-radius: 6px;
      text-align: center;
      min-width: 60px;
    }

    .demo.tall { min-height: 220px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Flexbox Playground</h1>

  <!-- Controls -->
  <div class="controls">
    <div class="control">
      <label>flex-direction</label>
      <select id="dir">
        <option value="row">row</option>
        <option value="row-reverse">row-reverse</option>
        <option value="column">column</option>
        <option value="column-reverse">column-reverse</option>
      </select>
    </div>

    <div class="control">
      <label>flex-wrap</label>
      <select id="wrap">
        <option value="nowrap">nowrap</option>
        <option value="wrap">wrap</option>
        <option value="wrap-reverse">wrap-reverse</option>
      </select>
    </div>

    <div class="control">
      <label>justify-content</label>
      <select id="justify">
        <option value="flex-start">flex-start</option>
        <option value="center" selected>center</option>
        <option value="flex-end">flex-end</option>
        <option value="space-between">space-between</option>
        <option value="space-around">space-around</option>
        <option value="space-evenly">space-evenly</option>
      </select>
    </div>

    <div class="control">
      <label>align-items</label>
      <select id="align">
        <option value="stretch">stretch</option>
        <option value="flex-start">start</option>
        <option value="center" selected>center</option>
        <option value="flex-end">end</option>
        <option value="baseline">baseline</option>
      </select>
    </div>
  </div>

  <!-- Demo area -->
  <div class="demo tall" id="demo">
    <div class="item" style="height:50px;">1</div>
    <div class="item" style="height:110px;">2</div>
    <div class="item" style="height:70px;">3</div>
    <div class="item" style="height:90px;">4</div>
    <div class="item">5</div>
  </div>
</div>

<script>
  const demo = document.getElementById('demo');

  const dir    = document.getElementById('dir');
  const wrap   = document.getElementById('wrap');
  const justify = document.getElementById('justify');
  const align  = document.getElementById('align');

  function update() {
    demo.style.flexDirection   = dir.value;
    demo.style.flexWrap        = wrap.value;
    demo.style.justifyContent  = justify.value;
    demo.style.alignItems      = align.value;
  }

  dir.onchange = wrap.onchange = justify.onchange = align.onchange = update;

  // Initial update
  update();
</script>

</body>
</html>
