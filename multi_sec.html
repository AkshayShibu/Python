<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Workspace</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  scroll-behavior: smooth;
}

nav {
  background: #222;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color:#6366f1;
}

section {
  padding: 70px 20px;
  text-align: center;
}

.hero {
  background: #6366f1;
  color: white;
}

.features {
  background: #f4f4f4;
}

.cta {
  background: #4f46e5;
  color: white;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: white;
  color:#6366f1;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
}

.btn:hover {
  background: #e0e0e0;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
  <a href="#home">Home</a>
  <a href="#features">Features</a>
  <a href="#contact">Contact</a>

  <a href="#log">Start free trial</a>
</nav>

<section id="home" class="hero">
  <h1>Flow Workspace</h1>
  <p>The modern workspace your team deserves</p>
  <a href="#" class="btn">Start Free</a>
</section>


<section id="features" class="features">
  <h2>Why Choose Flow?</h2>
  <p> Fast Collaboration</p>
  <p> Secure Platform</p>
  <p> Works Everywhere</p>
</section>


<section id="contact" class="cta">
  <h2>Ready to Get Started?</h2>
  <p>Join thousands of teams using Flow.</p>
  <a href="#" class="btn">Try Now</a>
</section>

</body>
</html>
