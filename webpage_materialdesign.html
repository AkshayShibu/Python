<!DOCTYPE html>
<html>
<head>
    <title>Material Design Page</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="grey lighten-4">

    <div class="container">
        <h3 class="center-align">Material Design Cards</h3>

        <div class="row">

            <div class="col s12 m6 l4">
                <div class="card">
                    <div class="card-content">
                        <span class="card-title">Card One</span>
                        <p>This is a simple material design card using Materialize CSS.</p>
                    </div>
                    <div class="card-action">
                        <a class="btn waves-effect waves-light blue">
                            <i class="material-icons left">thumb_up</i>Like
                        </a>
                    </div>
                </div>
            </div>

            <div class="col s12 m6 l4">
                <div class="card">
                    <div class="card-content">
                        <span class="card-title">Card Two</span>
                        <p>Material buttons have ripple effects and clean design.</p>
                    </div>
                    <div class="card-action">
                        <a class="btn waves-effect waves-light green">
                            <i class="material-icons left">info</i>Details
                        </a>
                    </div>
                </div>
            </div>

            <div class="col s12 m6 l4">
                <div class="card">
                    <div class="card-content">
                        <span class="card-title">Card Three</span>
                        <p>This layout is fully responsive using Material grid system.</p>
                    </div>
                    <div class="card-action">
                        <a class="btn waves-effect waves-light red">
                            <i class="material-icons left">delete</i>Delete
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

</body>
</html>
