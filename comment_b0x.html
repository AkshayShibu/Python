<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Box (No Saving)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f0fe, #d4e6ff);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .comment-box {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px;
        }
        h2, h3 { text-align: center; color: #333; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 130px; padding: 15px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 16px; resize: vertical;
        }
        textarea:focus {
            outline: none; border-color: #4a90e2;
            box-shadow: 0 0 8px rgba(74,144,226,0.2);
        }
        button {
            margin-top: 20px; padding: 12px 30px; background: #4a90e2;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 16px;
        }
        button:hover { background: #357abd; }
        .comment-item {
            background: #f8fbff; padding: 15px; margin-bottom: 12px;
            border-radius: 8px; border-left: 4px solid #4a90e2;
            word-wrap: break-word;
        }
        .no-comments {
            text-align: center; color: #777; font-style: italic; padding: 20px;
        }
        .clear-btn {
            background: #e74c3c; margin-left: 10px;
        }
        .clear-btn:hover { background: #c0392b; }
        .buttons { display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="comment-box">
            <h2>Leave a Comment</h2>
            <textarea id="commentInput" placeholder="Enter your comment here..."></textarea>
            <div class="buttons">
                <button onclick="saveComment()">Submit Comment</button>
                <button class="clear-btn" onclick="clearComments()">Clear All</button>
            </div>
        </div>

        <div class="comments-history">
            <h3>Comment History</h3>
            <ul id="commentList"></ul>
            <p id="noComments" class="no-comments">No comments yet. Be the first!</p>
        </div>
    </div>

    <script>
        // In-memory array only — nothing saved to browser
        let comments = [];

        function saveComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();

            if (text === '') {
                alert('Please write a comment before submitting!');
                return;
            }

            // Add new comment with timestamp
            comments.push({
                text: text,
                date: new Date().toLocaleString()
            });

            // Clear input
            input.value = '';

            // Update display
            displayComments();
        }

        function displayComments() {
            const list = document.getElementById('commentList');
            const noMsg = document.getElementById('noComments');

            // Clear current list
            list.innerHTML = '';

            if (comments.length === 0) {
                noMsg.style.display = 'block';
                return;
            }

            noMsg.style.display = 'none';

            // Show newest first
            [...comments].reverse().forEach(comment => {
                const item = document.createElement('li');
                item.className = 'comment-item';
                item.innerHTML = `<strong>${comment.date}</strong><br>${comment.text.replace(/\n/g, '<br>')}`;
                list.appendChild(item);
            });
        }

        function clearComments() {
            if (comments.length === 0) {
                alert('No comments to clear!');
                return;
            }
            if (confirm('Clear all comments?')) {
                comments = [];  // Reset the array
                displayComments();
            }
        }

        // Initial display (will show "No comments" on fresh load)
        displayComments();
    </script>
</body>
</html>
