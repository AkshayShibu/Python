<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background: #f8f9fa; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
    }
    .card { 
      max-width: 420px; 
      margin: auto; 
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow mt-5">
        <div class="card-header text-center">
          <h4>Account</h4>
        </div>

        <ul class="nav nav-tabs nav-justified" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
          </li>
        </ul>

        <div class="card-body tab-content p-4">
          <div class="tab-pane fade show active" id="login">
            <form>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="#" class="small">Forgot password?</a>
              </div>
              <button type="submit" class="btn btn-primary w-100">Sign In</button>
              <p class="text-center mt-3 mb-0 small">
                No account? <a href="#" data-bs-toggle="tab" data-bs-target="#register">Register</a>
              </p>
            </form>
          </div>

          <div class="tab-pane fade" id="register">
            <form>
              <div class="row g-3">
                <div class="col-6">
                  <input type="text" class="form-control" placeholder="First name" required>
                </div>
                <div class="col-6">
                  <input type="text" class="form-control" placeholder="Last name" required>
                </div>
              </div>
              <div class="my-3">
                <input type="email" class="form-control" placeholder="Email" required>
              </div>
              <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password" required minlength="8">
              </div>
              <div class="mb-4">
                <input type="password" class="form-control" placeholder="Confirm password" required>
              </div>
              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small" for="terms">
                  I agree to the <a href="#">Terms</a>
                </label>
              </div>
              <button type="submit" class="btn btn-primary w-100">Create Account</button>
              <p class="text-center mt-3 mb-0 small">
                Already have account? <a href="#" data-bs-toggle="tab" data-bs-target="#login">Sign in</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
