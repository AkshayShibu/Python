<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Search Filter</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input {
            padding: 8px;
            width: 250px;
        }
        li {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h2>Search Names</h2>

<input type="text" id="searchBox" placeholder="Type to search..." onkeyup="filterList()">

<ul id="nameList">
    <li>Akshay</li>
    <li>Aparna</li>
    <li>Rahul</li>
    <li>Meera</li>
    <li>John</li>
    <li>David</li>
</ul>

<script>
function filterList() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let ul = document.getElementById("nameList");
    let li = ul.getElementsByTagName("li");

    for (let i = 0; i < li.length; i++) {
        let text = li[i].textContent || li[i].innerText;
        if (text.toLowerCase().indexOf(input) > -1) {
            li[i].style.display = "";
        } else {
            li[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
