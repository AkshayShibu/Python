<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Grid Image Slideshow</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f17;
      color: #e0e0ff;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .slideshow-container {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 3 / 2;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      background: #111;
    }

    /* Grid layout for all slides */
    .slides {
      display: grid;
      grid-template-columns: repeat(10, 100%);   /* one column per slide */
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .slide {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* Optional overlay + caption */
    .slide::after {
      content: attr(data-title);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2.5rem 2rem 1.2rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      color: white;
      font-size: 1.4rem;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .slide.active::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* Navigation arrows */
    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      z-index: 10;
    }

    .nav-button:hover {
      background: rgba(30, 100, 220, 0.7);
      transform: translateY(-50%) scale(1.1);
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    /* Dots navigation */
    .dots {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #4dabf7;
      transform: scale(1.3);
    }

    @media (max-width: 600px) {
      .nav-button { width: 44px; height: 44px; font-size: 1.4rem; }
      .slide::after { font-size: 1.1rem; padding: 2rem 1.2rem 1rem; }
    }
  </style>
</head>
<body>

<div class="slideshow-container">
  <div class="slides" id="slides">

    <div class="slide" data-title="Mountain Lake Sunrise" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900');"></div>
    
    <div class="slide" data-title="Northern Lights" style="background-image: url('https://images.unsplash.com/photo-1484959014842-cd1d967a39cf?w=900');"></div>
    
    <div class="slide" data-title="Desert Dunes" style="background-image: url('https://images.unsplash.com/photo-1509316785289-02540e9f5d83?w=900');"></div>
    
    <div class="slide" data-title="Cherry Blossom Path" style="background-image: url('https://images.unsplash.com/photo-1525498128493-380d1990a112?w=900');"></div>
    
    <div class="slide" data-title="Misty Forest" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=900');"></div>

  </div>

  <button class="nav-button prev" id="prev">←</button>
  <button class="nav-button next" id="next">→</button>

  <div class="dots" id="dots"></div>
</div>

<script>
const slidesContainer = document.getElementById('slides');
const slides = document.querySelectorAll('.slide');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const dotsContainer = document.getElementById('dots');

let currentIndex = 0;
let slideCount = slides.length;
let autoPlayInterval;

// Create dots
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  if (i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => goToSlide(i));
  dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.dot');

function updateActiveStates() {
  slides.forEach((slide, i) => {
    slide.classList.toggle('active', i === currentIndex);
  });
  
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentIndex);
  });
}

function goToSlide(index) {
  currentIndex = (index + slideCount) % slideCount; // handle negative & overflow
  slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
  updateActiveStates();
}

function nextSlide() {
  goToSlide(currentIndex + 1);
}

function prevSlide() {
  goToSlide(currentIndex - 1);
}

// Button listeners
nextBtn.addEventListener('click', nextSlide);
prevBtn.addEventListener('click', prevSlide);

// Optional: autoplay
function startAutoplay() {
  autoPlayInterval = setInterval(nextSlide, 5000);
}

function stopAutoplay() {
  clearInterval(autoPlayInterval);
}

// Pause on hover / focus
document.querySelector('.slideshow-container').addEventListener('mouseenter', stopAutoplay);
document.querySelector('.slideshow-container').addEventListener('mouseleave', startAutoplay);

// Also pause when interacting with controls
[nextBtn, prevBtn, ...dots].forEach(el => {
  el.addEventListener('click', () => {
    stopAutoplay();
    setTimeout(startAutoplay, 8000); // longer pause after manual interaction
  });
});

// Initialize
updateActiveStates();
startAutoplay();

</script>

</body>
</html>
