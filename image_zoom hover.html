<!DOCTYPE html>
<html>
<head>
    <title>Image Zoom and Disable Right Click</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        .img-box {
            width: 500px;
            overflow: hidden;
            margin: auto;
            border: 2px solid #333;
        }

        .img-box img {
            width: 100%;
            transition: transform 0.4s ease;
            cursor: zoom-in;
        }

        .img-box img:hover {
            transform: scale(2.3);
        }
    </style>

    <script>
        // Disable right click
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
            alert("Right click is disabled!");
        });
    </script>
</head>

<body>
    <h2>Image Zoom on Hover</h2>

    <div class="img-box">
        <img src="C:\Users\Hp\Pictures\glasses-lie-laptop-reflecting-light-from-screen-dark_169016-52267.jpg" alt="Sample Image">
    </div>
</body>
</html>
